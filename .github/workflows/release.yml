name: release

# Push a tag like v0.1.0-alpha to build and publish both artifacts:
#   * a Linux x86_64 binary attached to the GitHub Release
#   * a container image pushed to ghcr.io/<owner>/nokk
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the Release + upload the binary
  packages: write   # push the image to GHCR

jobs:
  binary:
    name: Build release binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # BoringSSL (wreq) build deps — root runner, so straight from apt.
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake clang libclang-dev

      - name: Build
        run: cargo build --release --bin nokk

      - name: Package
        run: |
          tar -czf "nokk-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" -C target/release nokk

      - name: Publish to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: nokk-*-linux-x86_64.tar.gz
          generate_release_notes: true
          # SEO-oriented lead (keyword-rich); the auto-generated changelog is
          # appended below it by generate_release_notes.
          body: |
            **nokk ${{ github.ref_name }}** — an **undetectable headless browser engine** in
            **Rust**: real **V8** JavaScript + a DOM with a coherent **Chrome TLS/HTTP
            fingerprint (JA3/JA4)** and JS-level **anti-bot stealth**, driven over the
            **Chrome DevTools Protocol** so existing **Puppeteer** code just connects. No
            Chromium, no rendering. Good for **stealth web scraping**, **Cloudflare / anti-bot
            bypass**, and high-concurrency automation with **per-context proxy rotation**.

            ### Run it
            ```bash
            docker run --rm -p 9222:9222 ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            # or the Linux x86_64 binary attached below
            ```
            Point Puppeteer at `ws://localhost:9222/devtools/browser/nokk`.

            > Keywords: undetectable headless browser · anti-bot bypass · Cloudflare bypass ·
            > JA3/JA4 TLS fingerprint · browser fingerprint spoofing · stealth web scraping ·
            > Puppeteer-compatible · headless Chrome alternative · Rust.

            ---

  image:
    name: Build and push images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Default / smallest image: distroless. Tagged latest + version + :distroless.
      - name: Metadata (distroless)
        id: meta_distroless
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
            type=raw,value=distroless

      - name: Build and push (distroless)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: distroless
          push: true
          tags: ${{ steps.meta_distroless.outputs.tags }}
          labels: ${{ steps.meta_distroless.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Debian variant (has a shell for debugging): :debian + :<version>-debian.
      - name: Build and push (debian)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: debian
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:debian
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}-debian
          cache-from: type=gha
          cache-to: type=gha,mode=max
